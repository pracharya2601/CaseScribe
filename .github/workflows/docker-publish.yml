name: Build & publish container

# Builds the CaseScribe container on GitHub's native amd64 runners (no QEMU)
# and publishes it to GHCR. AgentBox pulls ghcr.io/<owner>/casescribe:latest.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

permissions:
  contents: read
  packages: write           # required to push to GHCR with the built-in GITHUB_TOKEN

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the owner for us (GHCR requires lowercase)
          images: ghcr.io/${{ github.repository_owner }}/casescribe
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (linux/amd64 — the AgentBox target)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
